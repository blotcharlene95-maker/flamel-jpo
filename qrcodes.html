<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Codes – Journées Portes Ouvertes – Collège Nicolas Flamel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Palatino Linotype',Palatino,serif;background:#f5f0e8;color:#2a1a00;padding:24px}

.page-title{text-align:center;margin-bottom:16px}
.page-title h1{font-size:22px;color:#7a4a00;letter-spacing:1px}
.page-title p{font-size:14px;color:#9a6a20;margin-top:4px}

.print-btn{display:block;margin:0 auto 24px;background:#2a6a2a;color:white;
  border:none;border-radius:8px;padding:12px 32px;font-size:16px;
  cursor:pointer;letter-spacing:1px;font-family:inherit}
.print-btn:hover{background:#1a4a1a}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:860px;margin:0 auto}

.card{background:white;border:2px solid #c8a050;border-radius:10px;
  padding:14px 10px 12px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  page-break-inside:avoid;break-inside:avoid}

.card-header{background:linear-gradient(135deg,#7a4a00,#c8860a);color:white;
  border-radius:6px;padding:7px 10px;margin-bottom:10px}
.card-header .num{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.85}
.card-header .lieu{font-size:14px;font-weight:bold;margin-top:2px}

.card img{border:3px solid #c8a050;border-radius:6px;padding:3px;
  background:white;display:block;margin:0 auto 8px;width:160px;height:160px}

.card-question{font-size:12px;color:#5a3a00;line-height:1.4;font-style:italic;min-height:36px}

.footer{text-align:center;margin-top:24px;font-size:12px;color:#9a7a40}

@media print{
  body{background:white;padding:8px}
  .print-btn{display:none}
  .grid{gap:8px;max-width:100%}
  .card{box-shadow:none;border:1.5px solid #c8a050}
  .page-title{margin-bottom:10px}
}
</style>
</head>
<body>

<div class="page-title">
  <h1>⚗️ À la découverte du collège Nicolas Flamel</h1>
  <p>Journées Portes Ouvertes — QR Codes à imprimer et afficher dans chaque salle</p>
</div>

<button class="print-btn" onclick="window.print()">🖨️ Imprimer les QR codes</button>

<div class="grid" id="grid"></div>

<div class="footer">
  Imprimez cette page, découpez les cartes et placez-les dans chaque salle.<br>
  Conseil : plastifiez les QR codes pour la durée de l'événement.
</div>

<script>
const STOPS=[
  {id:1,  lieu:"Hall d'entrée",     question:"Qui est Nicolas Flamel ?"},
  {id:2,  lieu:"Permanence",        question:"À quoi sert le dispositif pHARe ?"},
  {id:3,  lieu:"Salle 105",         question:"Que signifie le label E3D ?"},
  {id:4,  lieu:"Salle 110",         question:"Quelles options de langues en 5e ?"},
  {id:5,  lieu:"Salle 220",         question:"Combien d'heures de français en 6e ?"},
  {id:6,  lieu:"Salle 216",         question:"Que signifie EMC ?"},
  {id:7,  lieu:"Salles 214 et 211", question:"Combien d'élèves au collège en 2026 ?"},
  {id:8,  lieu:"CDI",               question:"Que veut dire CDI ?"},
  {id:9,  lieu:"SEGPA",             question:"(Découverte de la SEGPA)"},
  {id:10, lieu:"Hall de la SEGPA",  question:"Dans quel sport les élèves se sont-ils qualifiés pour les Championnats de France UNSS ?"},
];

// Construit l'URL de base automatiquement
const base = window.location.href.replace('qrcodes.html','index.html');

const grid = document.getElementById('grid');

STOPS.forEach(stop => {
  const url = base + '?q=' + stop.id;
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=4&data=' + encodeURIComponent(url);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="num">QR Code ${stop.id} / ${STOPS.length}</div>
      <div class="lieu">📍 ${stop.lieu}</div>
    </div>
    <img src="${qrSrc}" alt="QR Code ${stop.id}" loading="lazy"/>
    <div class="card-question">${stop.question}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
